<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduSmart 2026 Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>EduSmart 2026</h1>
    <p class="subtitle">Parent Dashboard</p>

    <div class="card">
      <h2>Student Profile</h2>
      <p><b>Name:</b> <span id="studentName">Loading...</span></p>
      <p><b>Class:</b> <span id="className">Loading...</span></p>
      <p><b>Parent:</b> <span id="parentName">Loading...</span></p>
      <p><b>Canteen Balance:</b> RM <span id="balance">0.00</span></p>
    </div>

    <div class="card">
      <h2>Assignments</h2>
      <div id="assignmentList">Loading assignments...</div>
    </div>

    <div class="status" id="statusMsg">Connecting...</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
