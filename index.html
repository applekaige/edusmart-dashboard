<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EduSmart 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f4f6f8;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 15px 0;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 6px;
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .helper {
      background: #eef2ff;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h1>EduSmart 2026</h1>

<div class="card">
  <h3 id="studentName">Loading...</h3>
  <p id="balance"></p>
</div>

<div class="card">
  <h3>AI Summary</h3>
  <p id="aiSummary">Loading...</p>
</div>

<div class="card">
  <h3>Assignments</h3>
  <div id="assignments">Loading...</div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwGRRktezMyxBJ_Q_N0dPHAIKI0nBeQukF4USmKG-konnTiXeo3Jz8XOf12FNxCFxb-/exec";
const STUDENT_ID = "STU001";

/* JSONP */
function fetchJsonp(url) {
  return new Promise((resolve, reject) => {
    const callbackName = "cb_" + Math.random().toString(36).substring(2);

    window[callbackName] = function(data) {
      resolve(data);
      delete window[callbackName];
    };

    const script = document.createElement("script");
    script.src = url + "&callback=" + callbackName;
    script.onerror = reject;

    document.body.appendChild(script);
  });
}

/* Load dashboard */
async function loadDashboard() {
  try {
    const data = await fetchJsonp(
      `${SCRIPT_URL}?action=getDashboardBundle&id=${STUDENT_ID}`
    );

    document.getElementById("studentName").innerText =
      data.student.student_name;

    document.getElementById("balance").innerText =
      "Balance: RM " + data.student.balance;

    document.getElementById("aiSummary").innerText =
      data.ai_summary;

    renderAssignments(data.assignments);

  } catch (err) {
    document.body.innerHTML = "<h2>Connection error</h2>";
  }
}

/* Render assignments */
function renderAssignments(list) {
  const container = document.getElementById("assignments");
  container.innerHTML = "";

  list.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h4>${item.subject}</h4>
      <p>${item.detail}</p>

      <button onclick="ack('${item.subject}')">ACKNOWLEDGE</button>
      <button onclick="getHelp('${item.subject}')">AI HELP</button>

      <div id="help-${item.subject}"></div>
    `;

    container.appendChild(div);
  });
}

/* ACK */
async function ack(subject) {
  await fetchJsonp(
    `${SCRIPT_URL}?action=ack&id=${STUDENT_ID}&subject=${subject}`
  );

  alert("ACK sent!");
}

/* AI Helper */
async function getHelp(subject) {
  const data = await fetchJsonp(
    `${SCRIPT_URL}?action=getAssignmentHelper&id=${STUDENT_ID}&subject=${subject}`
  );

  document.getElementById(`help-${subject}`).innerHTML = `
    <div class="helper">
      <b>Explanation:</b> ${data.simple_explanation}<br>
      <b>Action:</b> ${data.parent_action}
    </div>
  `;
}

/* INIT */
loadDashboard();
</script>

</body>
</html>
