<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSmart 2026 | Parent Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --bg: #f4f7f6;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--primary); }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); font-size: 24px; margin-bottom: 5px; }
        .student-id { text-align: center; color: #7f8c8d; font-size: 14px; margin-bottom: 25px; }
        
        .card { border-left: 5px solid var(--accent); background: #f9f9f9; padding: 15px; margin-bottom: 15px; border-radius: 8px; position: relative; }
        .card h3 { margin: 0 0 10px 0; font-size: 18px; }
        .card p { margin: 5px 0; font-size: 14px; line-height: 1.4; }
        
        .ack-btn { 
            background: var(--accent); color: white; border: none; padding: 8px 15px; 
            border-radius: 5px; cursor: pointer; font-weight: 600; width: 100%; margin-top: 10px;
            transition: 0.3s;
        }
        .ack-btn.done { background: var(--success); cursor: default; }
        
        .balance-box { background: #e8f4fd; padding: 15px; border-radius: 8px; text-align: center; margin-top: 20px; }
        .balance-box span { font-size: 22px; font-weight: bold; color: var(--success); }
        
        .footer { text-align: center; font-size: 10px; color: #bdc3c7; margin-top: 30px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fa-solid fa-graduation-cap"></i> EduSmart 2026</h1>
    <div class="student-id">Student: Sharrvesh | ID: 2026-SH-01</div>

    <div class="card">
        <h3>Mathematics</h3>
        <p id="math-task"><i class="fa-solid fa-spinner fa-spin"></i> Loading latest task...</p>
        <button class="ack-btn" onclick="acknowledge(this, 'Mathematics')">ACKNOWLEDGE</button>
    </div>

    <div class="card">
        <h3>Science</h3>
        <p id="sci-task"><i class="fa-solid fa-spinner fa-spin"></i> Loading latest task...</p>
        <button class="ack-btn" onclick="acknowledge(this, 'Science')">ACKNOWLEDGE</button>
    </div>

    <div class="balance-box">
        <p>SmartCard Canteen Balance</p>
        RM <span id="balance">0.00</span>
    </div>

    <div class="footer">Developed by TS. DR. PUVANESVARAN GUNALAN</div>
</div>

<script>
    // YOUR LIVE GOOGLE SCRIPT URL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzp5Me-SDRdVyobzxegY_C3PBZo3avEpih08IEBn199tVwc_bWeKhSHhsxlddonIB-v/exec";

    // 1. AUTO-LOAD DATA ON STARTUP
    async function loadData() {
        try {
            const response = await fetch(`${SCRIPT_URL}?read=true`);
            const data = await response.json();
            
            document.getElementById('math-task').innerText = data.math_detail;
            document.getElementById('sci-task').innerText = data.sci_detail;
            document.getElementById('balance').innerText = data.balance;
        } catch (e) {
            console.error("Sync Error", e);
            document.getElementById('math-task').innerText = "Update available via Cloud sync.";
        }
    }

    // 2. ACKNOWLEDGE FUNCTION (Triggers Telegram)
    async function acknowledge(btn, subject) {
        // Visual feedback
        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Syncing...';
        btn.disabled = true;

        const triggerUrl = `${SCRIPT_URL}?type=ACK&subject=${subject}&id=Sharrvesh`;

        try {
            // 'no-cors' is mandatory for triggering Google Scripts from a static HTML
            await fetch(triggerUrl, { 
                mode: 'no-cors',
                method: 'GET'
            });

            // If we reach here, the signal was sent
            btn.innerHTML = '<i class="fa-solid fa-check-double"></i> SEEN';
            btn.classList.add('done');
        } catch (e) {
            console.error("Telegram Trigger Failed", e);
            btn.innerHTML = "Retry";
            btn.disabled = false;
        }
    }

    // Run on page load
    loadData();
</script>

</body>
</html>
